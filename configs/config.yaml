project:
  name: blair-recommender
  seed: 42

# ---------------------------------------------------------------------------
# Pipeline Version  (v2 = pretrained BLAIR, v3 = custom domain BLAIR)
# ---------------------------------------------------------------------------
pipeline:
  active_version: "v3"
  v2_embedding_dir: "data/embeddings/using_inference"
  v3_embedding_dir: "data/embeddings/using_scratch_model"

# ---------------------------------------------------------------------------
# Embedding filenames  (resolved against active version dir by get_embedding_path)
# ---------------------------------------------------------------------------
embeddings:
  item_embeddings:      "item_embeddings.npy"
  item_ids:             "item_ids.npy"
  user_voice_embeddings: "user_voice_embeddings.npy"
  user_voice_ids:       "user_voice_ids.npy"
  faiss_index:          "faiss_index.bin"
  faiss_id_map:         "faiss_id_map.json"

# ---------------------------------------------------------------------------
# Paths  (all relative to project root; resolved via src/utils/config.py)
# ---------------------------------------------------------------------------
paths:
  # Directories
  data_raw:        data/raw
  data_processed:  data/processed
  data_embeddings: data/embeddings
  outputs_charts:  outputs/charts
  outputs_results: outputs/results

  # Raw input files
  raw_reviews: data/raw/Video_Games.jsonl.gz
  raw_meta:    data/raw/meta_Video_Games.jsonl.gz
  raw_train:   data/raw/Video_Games.train.csv.gz          # may not exist yet (incomplete download)
  raw_valid:   data/raw/Video_Games.valid.csv.gz
  raw_test:    data/raw/Video_Games.test.csv.gz

  # Stage 1 outputs
  meta_clean:    data/processed/meta_clean.parquet
  reviews_top5:  data/processed/reviews_top5.parquet
  train:         data/processed/train.parquet
  valid:         data/processed/valid.parquet
  test:          data/processed/test.parquet

  # Stage 2 outputs
  reviews_nlp:   data/processed/reviews_nlp.parquet

  # Stage 3 outputs (written in Colab, loaded locally)
  item_embeddings: data/embeddings/item_embeddings.npy
  item_ids:        data/embeddings/item_ids.npy

  # Stage 4 outputs
  faiss_index:     data/embeddings/faiss_index.bin
  candidates:      data/processed/candidates.parquet

  # Stage 5 outputs
  user_profiles:         data/processed/user_profiles.parquet
  user_voice_docs:       data/processed/user_voice_docs.parquet
  user_voice_embeddings: data/embeddings/user_voice_embeddings.npy
  user_voice_ids:        data/embeddings/user_voice_ids.npy

  # Stage 6 outputs
  features_train:  data/processed/features_train.parquet
  features_valid:  data/processed/features_valid.parquet
  features_test:   data/processed/features_test.parquet
  feature_stats:   outputs/results/feature_stats.json

  # Stage 7 outputs
  ranker_model:       outputs/results/lambdarank_model.pkl
  feature_importance: outputs/charts/feature_importance.png

  # Stage 8 outputs
  eval_results:     outputs/results/eval_results.json
  ablation_results: outputs/results/ablation_results.json

  # Stage 10 outputs
  qualitative_report: outputs/results/qualitative_report.html

# ---------------------------------------------------------------------------
# Stage 1 — Data Pipeline
# ---------------------------------------------------------------------------
stage1:
  min_reviews_per_user: 5   # 5-core filtering (drop users with < 5 reviews)
  min_reviews_per_item: 5   # 5-core filtering (drop items with < 5 reviews)

  meta_fields:
    - parent_asin
    - title
    - description
    - features
    - price
    - store
    - categories
    - average_rating
    - rating_number

  review_fields:
    - user_id
    - parent_asin
    - rating
    - text
    - timestamp
    - helpful_vote
    - verified_purchase

# ---------------------------------------------------------------------------
# Stage 2 — NLP Enrichment
# ---------------------------------------------------------------------------
stage2:
  # TF-IDF settings (used in aggregator for collective vocabulary)
  tfidf_ngram_min: 1
  tfidf_ngram_max: 2
  tfidf_max_features: 50000
  tfidf_min_df: 2
  # Temporal window percentages (fraction of a product's review count)
  temporal_window_pct: 0.10       # size of early / recent windows
  temporal_mid_start_pct: 0.45    # start of mid window
  temporal_mid_end_pct: 0.55      # end of mid window
  temporal_min_reviews: 10        # products with fewer use all reviews for all windows

  aspects:
    - gameplay
    - graphics
    - story
    - controls
    - value

  aspect_keywords:
    gameplay:
