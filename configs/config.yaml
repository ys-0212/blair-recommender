# ---------------------------------------------------------------------------
# Stage 3 — BLAIR Embeddings  (runs in Colab)
# ---------------------------------------------------------------------------
stage3:
  model_name: "D:/MLSP_Project/blair-recommender/models/blair-videogames-multiaspect"
  batch_size: 32                           
  max_seq_length: 512
  embedding_dim: 1024
  checkpoint_every: 5000                    # save partial results every N items
  embed_all_items: true                     # embed all 137k products

# ---------------------------------------------------------------------------
# Stage 4 — FAISS Retrieval
# ---------------------------------------------------------------------------
stage4:
  top_k_candidates: 200
  index_type: HNSW             # HNSW gives much better recall than IVFFlat
  metric: INNER_PRODUCT        # L2-normalised embeddings → cosine similarity
  # HNSW parameters
  hnsw_m: 32                   # connections per node (higher = better recall, more memory)
  hnsw_ef_construction: 200    # build quality (higher = better index, slower build)
  hnsw_ef_search: 128          # query recall (higher = better recall, slower search)
  # IVFFlat fallback parameters (used if index_type: IVFFlat)
  faiss_nlist: 512
  faiss_nprobe: 64

# ---------------------------------------------------------------------------
# Stage 5 — User Modeling
# ---------------------------------------------------------------------------
stage5:
  recency_lambda: 0.001         # exponential decay applied to timestamp differences (ms)
  query_weight: 0.7             # weight of query embedding in hybrid blend (tier 1/2)
  user_weight: 0.3              # weight of user profile embedding in hybrid blend (tier 1/2)
  # Tier-3 warm user three-way blend weights
  tier3_query_weight: 0.5
  tier3_combined_weight: 0.3
  tier3_voice_weight: 0.2
  # Tier-3 fallback when no voice embedding available
  tier3_query_weight_no_voice: 0.6
  tier3_combined_weight_no_voice: 0.4

# ---------------------------------------------------------------------------
# Stage 6 — Feature Engineering  (31 features + f27 forced-positive flag)
# ---------------------------------------------------------------------------
stage6:
  graded_relevance: true   # use rating (1-5) as relevance label for ground truth

# ---------------------------------------------------------------------------
# Stage 7 — LambdaRank (LightGBM)
# ---------------------------------------------------------------------------
stage7:
  # f27_is_forced_positive is EXCLUDED from training (not a real signal)
  feature_cols:
    - f01_faiss_score
    - f02_faiss_rank
    - f03_query_item_cosine
    - f04_user_uniform_cosine
    - f05_avg_rating
    - f06_rating_count_log
    - f07_review_count_log
    - f08_mean_sentiment
    - f09_price_normalized
    - f10_hidden_gem_score
    - f11_controversy_index
    - f12_desc_richness
    - f13_aspect_gameplay
    - f14_aspect_graphics
    - f15_aspect_story
    - f16_aspect_controls
    - f17_aspect_value
    - f18_user_item_voice_cosine
    - f19_category_match
    - f20_price_tier_match
    - f21_user_avg_sentiment_gap
    - f22_top_aspect_match
    - f23_interaction_count_log
    - f24_sentiment_trajectory
    - f25_verified_ratio
    - f26_helpfulness_weighted_sentiment
    - f28_user_recency_cosine
    - f29_user_rating_cosine
    - f30_user_combined_cosine
    - f31_bm25_score
  exclude_cols:
    - f27_is_forced_positive
  objective: lambdarank
  metric: ndcg
  ndcg_eval_at: [1, 5, 10]
  train_sample_ratio: 0.20   # load 20% of train row groups to cap peak RAM (~2.8 GB vs 14 GB)
  n_estimators: 2000
  learning_rate: 0.05
  max_depth: 7
  num_leaves: 63
  min_child_samples: 10
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 100
  lambdarank_truncation_level: 20
  n_jobs: -1
  model_path: outputs/results/lambdarank_model.lgb
  importance_chart: outputs/charts/feature_importance.png
  training_history: outputs/results/training_history.json

# ---------------------------------------------------------------------------
# Stage 8 — Evaluation
# ---------------------------------------------------------------------------
stage8:
  k_values: [1, 5, 10]
  bootstrap_iterations: 1000
  bootstrap_sample_size: 10000
  systems:
    - id: random_baseline
      name: Random Baseline
      score_col: random_score
    - id: bm25_baseline
      name: BM25 Baseline
      score_col: f31_bm25_score
    - id: faiss_baseline
      name: FAISS Semantic
      score_col: f01_faiss_score
    - id: lambdarank
      name: LambdaRank (Ours)
      score_col: lambdarank_score

# ---------------------------------------------------------------------------
# Stage 9 — Ablation Study
# ---------------------------------------------------------------------------
stage9:
  # Ablation configs are defined in src/stage9_ablation/main.py (ABLATION_CONFIGS)
  k_values: [1, 5, 10]

# ---------------------------------------------------------------------------
# Stage 10 — Qualitative Analysis
# ---------------------------------------------------------------------------
stage10:
  num_users: 5
  top_k_display: 5
  history_display: 5
